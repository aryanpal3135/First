<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #container{
            height: 500px;
            width: 90%;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            gap: 20px;
            background-color: azure;
        }
        #container > div{
            width: 80%;
            height: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: beige;
            border-radius: 5%;
            box-shadow: rgba(50, 50, 93, 0.25) 0px 50px 100px -20px, rgba(0, 0, 0, 0.3) 0px 30px 60px -30px, rgba(10, 37, 64, 0.35) 0px -2px 6px 0px inset;
        }
    </style>
</head>
<body>
    <div id="container">
    <div style="font-family: 'Times New Roman', Times, serif;">This is DIV 1</div>
    <div style="font-family: 'Times New Roman', Times, serif;">This is DIV 2</div>
    <div style="font-family: 'Times New Roman', Times, serif;">This is DIV 3</div>
    </div>
</body>
</html>
